<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - QuickVid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', }</script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-950 font-sans text-slate-800 dark:text-slate-100 flex flex-col transition-colors duration-300">

    <!-- NAVEGAÇÃO SIMPLES -->
    <nav class="bg-white dark:bg-slate-900 shadow-sm sticky top-0 z-50 transition-colors duration-300">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
                <div class="bg-blue-600 p-2 rounded-xl">
                    <i data-lucide="download" class="w-5 h-5 text-white"></i>
                </div>
                <span class="font-bold text-xl tracking-tight text-slate-900 dark:text-white">Quick<span class="text-blue-600">Vid</span></span>
            </a>
            <a href="index.html" class="text-sm font-medium text-slate-600 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 flex items-center gap-2 bg-slate-100 dark:bg-slate-800 px-4 py-2 rounded-full transition-colors">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Voltar ao Início
            </a>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4 sm:px-6 py-12 flex-grow w-full flex items-center justify-center">
        <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-xl border border-slate-200 dark:border-slate-800 p-8 md:p-12 w-full">
            
            <div class="text-center mb-10">
                <div class="w-16 h-16 bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="mail" class="w-8 h-8"></i>
                </div>
                <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white mb-2">Fale Connosco</h1>
                <p class="text-slate-500 dark:text-slate-400">Tem alguma dúvida, encontrou um erro ou quer sugerir uma funcionalidade? Envie-nos uma mensagem!</p>
            </div>

            <form onsubmit="enviarEmail(event)" class="space-y-6 max-w-lg mx-auto">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">O seu Nome</label>
                    <input type="text" id="nome" required class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Como devemos chamá-lo?">
                </div>
                
                <div>
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Assunto</label>
                    <select id="assunto" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all appearance-none cursor-pointer">
                        <option value="Dúvida Geral">Dúvida Geral</option>
                        <option value="Reportar um Erro">Reportar um Erro / Link não funciona</option>
                        <option value="Parceria / Publicidade">Parceria / Publicidade</option>
                        <option value="Direitos de Autor (DMCA)">Direitos de Autor (DMCA)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">Mensagem</label>
                    <textarea id="mensagem" required rows="5" class="w-full px-4 py-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all resize-none" placeholder="Escreva aqui a sua mensagem..."></textarea>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all hover:shadow-lg hover:shadow-blue-600/20 flex items-center justify-center gap-2 transform active:scale-95">
                    <i data-lucide="send" class="w-5 h-5"></i> Enviar Mensagem
                </button>
            </form>

            <div class="mt-12 text-center border-t border-slate-100 dark:border-slate-800 pt-8">
                <p class="text-sm text-slate-500 dark:text-slate-400">Ou envie um email diretamente para: <br>
                <a href="mailto:contato@seusite.com" class="text-blue-600 dark:text-blue-400 font-bold hover:underline mt-1 inline-block">contato@seusite.com</a></p>
            </div>
        </div>
    </main>

    <footer class="bg-slate-900 text-slate-400 py-8 border-t border-slate-800 mt-auto text-center text-sm">
        <p>© 2026 QuickVid. Todos os direitos reservados.</p>
    </footer>

    <script>
        lucide.createIcons();
        
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        // Esta função prepara os dados do formulário e abre a aplicação de email nativa do utilizador
        function enviarEmail(e) {
            e.preventDefault();
            
            const nome = document.getElementById('nome').value;
            const assunto = document.getElementById('assunto').value;
            const mensagem = document.getElementById('mensagem').value;
            
            // Substitua 'contato@seusite.com' pelo seu email real
            const emailDestino = "contato@seusite.com";
            // Repare que o nome do projeto no assunto do email também foi atualizado para QuickVid
            const assuntoCodificado = encodeURIComponent(`QuickVid - ${assunto} (De: ${nome})`);
            const mensagemCodificada = encodeURIComponent(mensagem);
            
            window.location.href = `mailto:${emailDestino}?subject=${assuntoCodificado}&body=${mensagemCodificada}`;
        }
    </script>
</body>
</html>
